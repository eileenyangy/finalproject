<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>time is finite</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 28px 0 48px;
      }
      #bg-video {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        filter: blur(12px);
        transform: scale(1.1);
        z-index: 0;
        display: none;
      }
      #bg-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.55);
        z-index: 1;
        display: none;
        pointer-events: none;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <video id="bg-video" autoplay muted loop playsinline src="data/background.mp4"></video>
    <div id="bg-overlay"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
